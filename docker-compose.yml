services:
  paper:
    image: itzg/minecraft-server:java21
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MC_VERSION:-1.21.11}"
      MEMORY: "2G"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:-zenbukkowa-rcon}"
      OPS: "${OPS:-}"
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - ./tmp/mc-data:/data
      - ./build/libs:/plugins:ro
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
      interval: 15s
      timeout: 10s
      retries: 20
