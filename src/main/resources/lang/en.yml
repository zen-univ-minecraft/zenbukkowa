help:
  rules:
    - "&6=== Rules ==="
    - "&e1. Break blocks to earn points in 5 categories."
    - "&e2. Spend points to unlock skills."
    - "&e3. First tier costs 50 points."
    - "&e4. Destroy structures for huge bonuses."
    - "&e5. Highest total score wins."
    - "&e6. No refunds on skill purchases."
    - "&e7. Containers are protected."
  points:
    - "&6=== Points System ==="
    - "&eBreak blocks to earn category points."
    - "&eTERRA: stone, dirt, sand, gravel"
    - "&eMINERAL: ores, ancient debris"
    - "&eORGANIC: logs, leaves, crops"
    - "&eAQUATIC: prismarine, coral, sponge"
    - "&eVOID: obsidian, netherrack, end stone"
    - "&eBase blocks = 1 pt, ores = 5 pts, ancient debris = 20 pts"
  skills:
    - "&6=== Skills ==="
    - "&eSpend category points to unlock skills."
    - "&eSkills have tiers and prerequisites."
    - "&eBuild a path: TERRA area -> MINERAL haste -> etc."
    - "&eOpen Skills menu to see all unlocks."
    - "&eScroll up and down to explore the tree."
  breaking:
    - "&6=== Area Breaking ==="
    - "&eBreaking one block breaks an area."
    - "&eRadius = horizontal spread. Depth = vertical layers."
    - "&eMax area = 9x9x9 at tier 5."
    - "&eContainers and bedrock are protected."
  structures:
    - "&6=== Structures ==="
    - "&eDestroy 80% of an Ocean Monument or Woodland Mansion."
    - "&eEarn +5000 points and a server broadcast."
    - "&eOnly the first player to destroy each gets the bonus."
  tips:
    - "&6=== Tips ==="
    - "&e1. Balance your categories for faster skill unlocks."
    - "&e2. Mine deep for VOID bonus with Void Siphon."
    - "&e3. Use Tide Breaker to clear Ocean Monuments."
    - "&e4. Buy Haste Aura early for faster mining."
    - "&e5. Check the scoreboard to track progress."
  commands:
    - "&6=== Commands ==="
    - "&e/zenbukkowa start - start event (op)"
    - "&e/zenbukkowa end - end event (op)"
    - "&e/zenbukkowa status - check event status"
    - "&e/zenbukkowa reset <player> - reset player (op)"
    - "&e/zenbukkowa resetall - reset all players (op)"
    - "&eClick the Nether Star in hotbar slot 8 for menus."

