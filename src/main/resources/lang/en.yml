help:
  rules:
    children:
      overview:
        label: "Overview"
        text: "&6=== Rules ===\n&e1. Break blocks to earn points in 7 categories.\n&e2. Spend points to unlock skills.\n&e3. First tier costs 50 points.\n&e4. Destroy structures for huge bonuses.\n&e5. Discover new block types for one-time bonuses.\n&e6. Highest total score wins.\n&e7. No refunds on skill purchases.\n&e8. Containers are protected.\n&e9. Player-placed blocks do not award points."
      scoring:
        label: "Scoring"
        text: "&6=== Scoring ===\n&eBreak blocks to earn category points.\n&eTERRA: stone, dirt, sand, gravel\n&eMINERAL: ores, ancient debris\n&eORGANIC: logs, leaves, crops\n&eAQUATIC: prismarine, coral, sponge\n&eVOID: obsidian, netherrack, end stone\n&eCROP: wheat, carrots, potatoes, cocoa\n&eDISCOVERY: first break of any natural block\n&eBase blocks = 5 pts, ores = 25 pts, ancient debris = 100 pts"
      protection:
        label: "Protection"
        text: "&6=== Protection ===\n&eContainers and bedrock cannot be broken.\n&eStructure bonuses are one-time only.\n&ePlayer-placed blocks do not award points.\n&eImmature crops do not award points."
  points:
    children:
      ores:
        label: "Ores"
        text: "&6=== Ores ===\n&eCoal, iron, copper, gold, redstone, lapis, diamond, emerald, ancient debris, amethyst give MINERAL points.\n&eAncient debris gives 20 points."
      terra:
        label: "TERRA"
        text: "&6=== TERRA Blocks ===\n&eStone, cobblestone, deepslate, tuff, dirt, sand, gravel, granite, terracotta give TERRA points."
      aquatic:
        label: "AQUATIC"
        text: "&6=== AQUATIC Blocks ===\n&ePrismarine, sea lantern, coral, sponge, kelp, clay give AQUATIC points."
      crop:
        label: "CROP"
        text: "&6=== CROP Blocks ===\n&eWheat, carrots, potatoes, beetroots, cocoa, melon stems, pumpkin stems, nether wart give CROP points."
      discovery:
        label: "Discovery"
        text: "&6=== Discovery ===\n&eBreak any naturally occurring block type for the first time to earn DISCOVERY points.\n&eCommon blocks = 10 pts, uncommon = 25 pts, rare = 50 pts, epic = 200 pts.\n&eDiscovery skills increase these bonuses."
  skills:
    children:
      tiers:
        label: "Tiers"
        text: "&6=== Skill Tiers ===\n&eEach skill has up to 5 tiers.\n&eHigher tiers cost more points.\n&eYou must buy tiers in order."
      prerequisites:
        label: "Prerequisites"
        text: "&6=== Prerequisites ===\n&eSome skills require other skills first.\n&eEach branch unlocks independently.\n&eSome skills cost multiple categories."
      costs:
        label: "Costs"
        text: "&6=== Skill Costs ===\n&eCost formula: 50 * tier.\n&eTier 1 = 50 points.\n&eTier 2 = 100 points.\n&eTier 3 = 150 points.\n&eMythic skills cost 250 * tier per category."
  breaking:
    children:
      radius:
        label: "Radius & Depth"
        text: "&6=== Area Breaking ===\n&eBreaking one block breaks an area.\n&eRadius = horizontal spread. Depth = vertical layers.\n&eMax area = 9x9x9 at tier 5.\n&eContainers and bedrock are protected."
      protection:
        label: "Protection"
        text: "&6=== Break Protection ===\n&eContainers and bedrock are never broken.\n&eArea breaks respect claims and protections.\n&ePlayer-placed blocks do not award points."
  structures:
    children:
      monument:
        label: "Ocean Monument"
        text: "&6=== Ocean Monument ===\n&eDestroy 80% of an Ocean Monument.\n&eEarn +5000 points and a server broadcast.\n&eOnly the first player to destroy each gets the bonus."
      mansion:
        label: "Woodland Mansion"
        text: "&6=== Woodland Mansion ===\n&eDestroy 80% of a Woodland Mansion.\n&eEarn +5000 points and a server broadcast.\n&eOnly the first player to destroy each gets the bonus."
  commands:
    children:
      op:
        label: "Operator"
        text: "&6=== Operator Commands ===\n&e/zenbukkowa start - start event\n&e/zenbukkowa end - end event\n&e/zenbukkowa reset <player> - reset player\n&e/zenbukkowa resetall - reset all players"
      player:
        label: "Player"
        text: "&6=== Player Commands ===\n&e/zenbukkowa status - check event status\n&eClick the Nether Star in hotbar slot 8 for menus."

