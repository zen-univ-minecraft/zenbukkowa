help:
  rules:
    children:
      overview:
        label: "概要"
        text: "&6=== ルール ===\n&e1. ブロックを壊して7つのカテゴリのポイントを獲得します。\n&e2. ポイントを消費してスキルを解除します。\n&e3. 最初のティアは500ポイントです。\n&e4. 構造物を破壊して大量のボーナスを獲得します。\n&e5. 新しいブロックタイプを発見して一度きりのボーナスを獲得します。\n&e6. 合計スコアが最も高いプレイヤーが勝利します。\n&e7. スキルの購入は返金できません。\n&e8. コンテナは保護されています。\n&e9. プレイヤーが設置したブロックはポイントになりません。"
      scoring:
        label: "採点"
        text: "&6=== 採点 ===\n&eブロックを壊してカテゴリポイントを獲得します。\n&eTERRA: 石、土、砂、砂利\n&eMINERAL: 鉱石、古代の残骸\n&eORGANIC: 原木、葉、作物\n&eAQUATIC: プリズマリン、サンゴ、スポンジ\n&eVOID: 黒曜石、ネザーラック、エンドストーン\n&eCROP: 小麦、人参、ジャガイモ、カカオ\n&eDISCOVERY: 自然生成ブロックの初破壊\n&e基本ブロック = 5pt、鉱石 = 25pt、古代の残骸 = 100pt"
      protection:
        label: "保護"
        text: "&6=== 保護 ===\n&eコンテナと岩盤は破壊できません。\n&e構造物ボーナスは一度きりです。\n&eプレイヤーが設置したブロックはポイントになりません。\n&e未成熟の作物はポイントになりません。"
  points:
    children:
      ores:
        label: "鉱石"
        text: "&6=== 鉱石 ===\n&e石炭、鉄、銅、金、レッドストーン、ラピス、ダイヤモンド、エメラルド、古代の残骸、アメジストがMINERALポイントを与えます。\n&e古代の残骸は100ポイントです。"
      terra:
        label: "TERRA"
        text: "&6=== TERRAブロック ===\n&e石、丸石、深層岩、凝灰岩、土、砂、砂利、花崗岩、テラコッタがTERRAポイントを与えます。"
      aquatic:
        label: "AQUATIC"
        text: "&6=== AQUATICブロック ===\n&eプリズマリン、シーランタン、サンゴ、スポンジ、昆布、粘土がAQUATICポイントを与えます。"
      crop:
        label: "CROP"
        text: "&6=== CROPブロック ===\n&e小麦、人参、ジャガイモ、ビートルート、カカオ、メロンの茎、カボチャの茎、ネザーウォートがCROPポイントを与えます。"
      discovery:
        label: "発見"
        text: "&6=== 発見 ===\n&e自然生成されるブロックタイプを初めて破壊するとDISCOVERYポイントを獲得します。\n&e一般的なブロック = 10pt、珍しいブロック = 25pt、レアブロック = 50pt、エピックブロック = 200pt。\n&e発見スキルでボーナスが増加します。"
  skills:
    children:
      tiers:
        label: "ティア"
        text: "&6=== スキルティア ===\n&e各スキルは最大5ティアまであります。\n&e高いティアほど多くのポイントが必要です。\n&eティアは順番に購入する必要があります。"
      prerequisites:
        label: "前提条件"
        text: "&6=== 前提条件 ===\n&e一部のスキルは他のスキルが必要です。\n&eTERRAはツリーの根です。\n&eすべてのブランチはAREA_RADIUSティア1が必要です。"
      costs:
        label: "コスト"
        text: "&6=== スキルコスト ===\n&eコスト公式: 500 * ティア * ティア。\n&eティア1 = 500ポイント。\n&eティア2 = 2000ポイント。\n&eティア3 = 4500ポイント。"
  breaking:
    children:
      radius:
        label: "範囲と深度"
        text: "&6=== 範囲破壊 ===\n&e1つのブロックを壊すと範囲が壊れます。\n&e範囲 = 水平広がり。深度 = 垂直層。\n&e最大範囲 = ティア5で9x9x9。\n&eコンテナと岩盤は保護されています。"
      protection:
        label: "保護"
        text: "&6=== 破壊保護 ===\n&eコンテナと岩盤は決して壊れません。\n&e範囲破壊は保護とクレームを尊重します。\n&eプレイヤーが設置したブロックはポイントになりません。"
  structures:
    children:
      monument:
        label: "海底神殿"
        text: "&6=== 海底神殿 ===\n&e海底神殿の80%を破壊します。\n&e5000ポイントとサーバー全体の告知を獲得します。\n&e各神殿で最初に破壊したプレイヤーのみがボーナスを獲得します。"
      mansion:
        label: "森の洋館"
        text: "&6=== 森の洋館 ===\n&e森の洋館の80%を破壊します。\n&e5000ポイントとサーバー全体の告知を獲得します。\n&e各洋館で最初に破壊したプレイヤーのみがボーナスを獲得します。"
  commands:
    children:
      op:
        label: "運営"
        text: "&6=== 運営コマンド ===\n&e/zenbukkowa start - イベント開始\n&e/zenbukkowa end - イベント終了\n&e/zenbukkowa reset <player> - プレイヤーリセット\n&e/zenbukkowa resetall - 全プレイヤーリセット"
      player:
        label: "プレイヤー"
        text: "&6=== プレイヤーコマンド ===\n&e/zenbukkowa status - イベント状態確認\n&eホットバースロット8のネザースターをクリックしてメニューを開きます。"

