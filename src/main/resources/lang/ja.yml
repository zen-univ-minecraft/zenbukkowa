help:
  rules:
    - "&6=== ルール ==="
    - "&e1. ブロックを壊して5種類のポイントを獲得"
    - "&e2. ポイントを消費してスキルを解放"
    - "&e3. 最初のティアは50ポイント"
    - "&e4. 構造物を破壊して大量ボーナス"
    - "&e5. 合計スコアが最も高い人が勝利"
    - "&e6. スキル購入は返金不可"
    - "&e7. 容器類は保護対象"
  points:
    - "&6=== ポイントシステム ==="
    - "&eブロックを壊してカテゴリポイントを獲得"
    - "&eTERRA: 石、土、砂、砂利"
    - "&eMINERAL: 鉱石、古代の残骸"
    - "&eORGANIC: 原木、葉、作物"
    - "&eAQUATIC: プリズマリン、サンゴ、スポンジ"
    - "&eVOID: 黒曜石、ネザーラック、エンドストーン"
    - "&e基本ブロック=1pt、鉱石=5pt、古代の残骸=20pt"
  skills:
    - "&6=== スキル ==="
    - "&eカテゴリポイントを消費してスキルを解放"
    - "&eスキルにはティアと前提条件がある"
    - "&eパスを構築: TERRA面 -> MINERAL加速 -> etc."
    - "&eスキルメニューですべての解放条件を確認"
    - "&e上下にスクロールしてツリーを探索"
  breaking:
    - "&6=== 範囲破壊 ==="
    - "&e1ブロックを壊すと範囲が破壊される"
    - "&e半径=水平広がり、深度=垂直層"
    - "&e最大範囲=ティア5で9x9x9"
    - "&e容器類と岩盤は保護される"
  structures:
    - "&6=== 構造物 ==="
    - "&e海底神殿または森の洋館の80%を破壊"
    - "&e+5000ポイントとサーバー通知を獲得"
    - "&e各構造物のボーナスは初回のみ"
  tips:
    - "&6=== ヒント ==="
    - "&e1. カテゴリをバランスよく掘ると解放が早い"
    - "&e2. 深く掘るとVOIDシフォンのボーナス"
    - "&e3. タイドブレイカーで海底神殿を破壊"
    - "&e4. ヘイストオーラは序盤に買うと良い"
    - "&e5. スコアボードで進捗を確認"
  commands:
    - "&6=== コマンド ==="
    - "&e/zenbukkowa start - イベント開始(管理者)"
    - "&e/zenbukkowa end - イベント終了(管理者)"
    - "&e/zenbukkowa status - イベント状態確認"
    - "&e/zenbukkowa reset <player> - プレイヤーリセット(管理者)"
    - "&e/zenbukkowa resetall - 全プレイヤーリセット(管理者)"
    - "&eホットバー8番のネザースターをクリック"

