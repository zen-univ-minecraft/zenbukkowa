help:
  rules:
    children:
      overview:
        label: "概要"
        text: "&6=== ルール ===\n&e1. ブロックを壊して6種類のポイントを獲得\n&e2. ポイントを消費してスキルを解放\n&e3. 最初のティアは50ポイント\n&e4. 構造物を破壊して大量ボーナス\n&e5. 合計スコアが最も高い人が勝利\n&e6. スキル購入は返金不可\n&e7. 容器類は保護対象"
      scoring:
        label: "スコア"
        text: "&6=== スコア ===\n&eブロックを壊してカテゴリポイントを獲得\n&eTERRA: 石、土、砂、砂利\n&eMINERAL: 鉱石、古代の残骸\n&eORGANIC: 原木、葉、作物\n&eAQUATIC: プリズマリン、サンゴ、スポンジ\n&eVOID: 黒曜石、ネザーラック、エンドストーン\n&eCROP: 小麦、人参、ジャガイモ、カカオ\n&e基本ブロック=1pt、鉱石=5pt、古代の残骸=20pt"
      protection:
        label: "保護"
        text: "&6=== 保護 ===\n&e容器類と岩盤は破壊できません\n&e構造物ボーナスは初回のみです"
  points:
    children:
      ores:
        label: "鉱石"
        text: "&6=== 鉱石 ===\n&e石炭、鉄、銅、金、レッドストーン、ラピス、ダイヤモンド、エメラルド、古代の残骸、アメジストからMINERALポイントを獲得\n&e古代の残骸は20ポイント"
      terra:
        label: "TERRA"
        text: "&6=== TERRAブロック ===\n&e石、丸石、深層岩、凝灰岩、土、砂、砂利、花崗岩、テラコッタからTERRAポイントを獲得"
      aquatic:
        label: "AQUATIC"
        text: "&6=== AQUATICブロック ===\n&eプリズマリン、シーランタン、サンゴ、スポンジ、コンブ、粘土からAQUATICポイントを獲得"
      crop:
        label: "CROP"
        text: "&6=== CROPブロック ===\n&e小麦、人参、ジャガイモ、ビートルート、カカオ、メロンの茎、カボチャの茎、ネザーウォートからCROPポイントを獲得"
  skills:
    children:
      tiers:
        label: "ティア"
        text: "&6=== スキルティア ===\n&e各スキルは最大5ティア\n&e高いティアほどコストが増加\n&eティアは順番に購入する必要があります"
      prerequisites:
        label: "前提条件"
        text: "&6=== 前提条件 ===\n&e一部のスキルは他のスキルが必要\n&eTERRAがツリーの根\n&e全ブランチはAREA_RADIUSティア1が必要"
      costs:
        label: "コスト"
        text: "&6=== スキルコスト ===\n&eコスト公式: 50 * ティア * ティア\n&eティア1 = 50ポイント\n&eティア2 = 200ポイント\n&eティア3 = 450ポイント"
  breaking:
    children:
      radius:
        label: "範囲と深度"
        text: "&6=== 範囲破壊 ===\n&e1ブロックを壊すと範囲が破壊される\n&e半径=水平広がり、深度=垂直層\n&e最大範囲=ティア5で9x9x9\n&e容器類と岩盤は保護される"
      protection:
        label: "保護"
        text: "&6=== 破壊保護 ===\n&e容器類と岩盤は決して破壊されない\n&e範囲破壊は保護を尊重する"
  structures:
    children:
      monument:
        label: "海底神殿"
        text: "&6=== 海底神殿 ===\n&e海底神殿の80%を破壊\n&e+5000ポイントとサーバー通知を獲得\n&e各構造物のボーナスは初回のみ"
      mansion:
        label: "森の洋館"
        text: "&6=== 森の洋館 ===\n&e森の洋館の80%を破壊\n&e+5000ポイントとサーバー通知を獲得\n&e各構造物のボーナスは初回のみ"
  commands:
    children:
      op:
        label: "管理者"
        text: "&6=== 管理者コマンド ===\n&e/zenbukkowa start - イベント開始\n&e/zenbukkowa end - イベント終了\n&e/zenbukkowa reset <player> - プレイヤーリセット\n&e/zenbukkowa resetall - 全プレイヤーリセット"
      player:
        label: "プレイヤー"
        text: "&6=== プレイヤーコマンド ===\n&e/zenbukkowa status - イベント状態確認\n&eホットバー8番のネザースターをクリック"

