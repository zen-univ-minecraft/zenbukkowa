services:
  paper:
    image: itzg/minecraft-server:java21
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MC_VERSION:-1.21.11}"
      MEMORY: "2G"
      ONLINE_MODE: "FALSE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD:-zenbukkowa-rcon}"
      OPS: "${OPS:-}"
    ports:
      - "25565:25565"
      - "25575:25575"
    volumes:
      - ./tmp/mc-data:/data
      - ./build/libs:/plugins:ro
    healthcheck:
      test: ["CMD", "mc-monitor", "status", "--host", "127.0.0.1", "--port", "25565"]
      interval: 15s
      timeout: 10s
      retries: 20

  verify:
    image: gradle:8.10.2-jdk21
    working_dir: /workspace
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle
    command: ["bash", "scripts/verify.sh"]

  smoke:
    image: python:3.12-slim
    working_dir: /workspace
    environment:
      RCON_HOST: paper
      RCON_PORT: 25575
      RCON_PASSWORD: "${RCON_PASSWORD:-zenbukkowa-rcon}"
    volumes:
      - .:/workspace
    depends_on:
      paper:
        condition: service_healthy
    command: ["bash", "scripts/smoke.sh"]

volumes:
  gradle-cache:
